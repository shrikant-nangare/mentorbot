apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mentorbot
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "<YOUR_GIT_REPO_URL>"
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: mentorbot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

