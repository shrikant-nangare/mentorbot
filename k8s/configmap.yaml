apiVersion: v1
kind: ConfigMap
metadata:
  name: mentorbot-config
  namespace: mentorbot
data:
  # IMPORTANT:
  # - Students should not be blocked by site-wide Basic Auth prompts.
  # - Parent portal remains protected by Ingress Basic Auth + Parent PIN.
  MENTORBOT_BASIC_AUTH_ENABLED: "false"

  # Core storage
  MENTORBOT_DB_DIR: "/app/db"

  # Cache
  MENTORBOT_CACHE_ENABLED: "true"
  MENTORBOT_CACHE_PATH: "/app/db/mentorbot-cache.sqlite3"
  MENTORBOT_CACHE_TTL_S: "604800"
  MENTORBOT_CACHE_MAX_ENTRIES: "5000"
  MENTORBOT_CACHE_RETRIEVAL_ENABLED: "true"

  # Retrieval
  MENTORBOT_RETRIEVAL_K: "4"
  MENTORBOT_RETRIEVAL_MIN_RELEVANCE: "0.25"

  # LLM (OpenAI-compatible chat)
  MENTORBOT_LLM_API_STYLE: "openai-chat"
  MENTORBOT_LLM_BASE_URL: "https://api.openai.com/v1"
  MENTORBOT_LLM_MODEL: "gpt-5.4-nano"
  MENTORBOT_LLM_TIMEOUT_S: "60"
  MENTORBOT_LLM_MAX_TOKENS: "800"

  # Embeddings (OpenAI-compatible)
  MENTORBOT_EMBEDDINGS_API_STYLE: "openai-embeddings"
  MENTORBOT_EMBEDDINGS_BASE_URL: "https://openrouter.ai/api/v1"
  MENTORBOT_EMBEDDINGS_MODEL: "text-embedding-3-small"

  # Optional: local ollama settings (used only if selected by app config)
  OLLAMA_BASE_URL: "http://192.168.1.215:11434"
  OLLAMA_EMBED_MODEL: "nomic-embed-text:latest"
  OLLAMA_KEEP_ALIVE: "24h"

