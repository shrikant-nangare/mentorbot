apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mentorbot-portal
  namespace: mentorbot
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: mentorbot-portal-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "MentorBot Parent Portal"
spec:
  ingressClassName: nginx
  rules:
    - host: mentorbot.aiklox.com
      http:
        paths:
          - path: /parent
            pathType: Prefix
            backend:
              service:
                name: mentorbot
                port:
                  name: http
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: mentorbot
                port:
                  name: http
          - path: /openapi.json
            pathType: Prefix
            backend:
              service:
                name: mentorbot
                port:
                  name: http
  tls:
    - hosts:
        - mentorbot.aiklox.com
      secretName: aiklox-tls

