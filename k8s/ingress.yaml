apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mentorbot
  namespace: mentorbot
  annotations:
    # For nginx ingress controller (adjust if you use something else)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  rules:
    - host: mentorbot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mentorbot
                port:
                  name: http

